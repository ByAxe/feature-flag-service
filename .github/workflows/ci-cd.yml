name: ci-cd

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit + integration tests + checks
        run: ./gradlew check

      - name: Build boot artifact
        run: ./gradlew bootJar

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/test-results
          retention-days: 14

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-flag-service-jar
          path: build/libs/*.jar
          retention-days: 14
